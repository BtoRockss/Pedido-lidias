<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Pedido · Lidia Gourmet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; padding-bottom: 20px; }
  .header { background: #1A5276; color: #fff; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
  .header h1 { font-size: 18px; }
  .header p { font-size: 12px; opacity: .85; margin-top: 4px; }
  .header-status { font-size: 11px; margin-top: 6px; opacity: .85; }
  .progress-wrap { background: rgba(255,255,255,.25); border-radius: 10px; height: 8px; margin-top: 10px; overflow: hidden; }
  .progress-bar { background: #2ECC71; height: 100%; width: 0; transition: width .3s; }
  .btn-refresh { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; margin-top: 8px; cursor: pointer; }
  .loading { text-align: center; padding: 40px; color: #666; }
  .spinner { width: 36px; height: 36px; border: 4px solid #ddd; border-top-color: #1E8449; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .banner { margin: 10px 12px 0; padding: 8px 12px; border-radius: 8px; font-size: 12px; display: none; }
  .banner.warn { background: #FEF9E7; color: #7D6608; display: block; }
  .resumen { background: #fff; margin: 12px; border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.1); display: none; }
  .resumen h2 { font-size: 14px; color: #1A5276; margin-bottom: 8px; border-bottom: 2px solid #1A5276; padding-bottom: 4px; }
  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .resumen-item { background: #EBF5FB; border-radius: 8px; padding: 8px 10px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .resumen-item .badge { background: #1E8449; color: #fff; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; min-width: 28px; text-align: center; }
  .badge.cero { background: #aaa; }
  .total-general { margin-top: 8px; background: #1A5276; color: #fff; border-radius: 8px; padding: 10px; text-align: center; font-size: 15px; font-weight: bold; }
  .proveedores-container { display: none; }
  .proveedor { margin: 12px; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
  .proveedor-header { background: #1E8449; color: #fff; padding: 12px 14px; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .proveedor-header .count { background: rgba(255,255,255,.25); border-radius: 12px; padding: 2px 10px; font-size: 13px; }
  .sin-pedido .proveedor-header { background: #aaa; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  thead tr { background: #D5F5E3; }
  thead th { padding: 8px 10px; font-size: 12px; color: #145A32; text-align: left; border-bottom: 2px solid #1E8449; }
  thead th:last-child { text-align: right; }
  tbody tr:nth-child(even) { background: #f9f9f9; }
  tbody tr { border-bottom: 1px solid #eee; }
  tbody td { padding: 12px 10px; font-size: 14px; vertical-align: middle; }
  .qty { text-align: right; font-weight: bold; font-size: 16px; color: #1A5276; white-space: nowrap; }
  .unit { font-size: 11px; color: #888; margin-left: 2px; font-weight: normal; }
  .precio { font-size: 11px; color: #999; }
  .obsnote { font-size: 11px; color: #B9770E; margin-top: 3px; font-style: italic; }
  .check { width: 26px; height: 26px; border: 2px solid #1E8449; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: transparent; }
  td.check-col { width: 38px; }
  tr.done td { opacity: .35; text-decoration: line-through; }
  tr.done .check { background: #1E8449; border-color: #1E8449; color: #fff; }
  .footer { text-align: center; padding: 20px; color: #aaa; font-size: 11px; }
</style>
</head>
<body>
<div class="header">
  <h1>📋 Lista de Pedido Semanal</h1>
  <p>Toca cada producto al comprarlo (se guarda en tu teléfono)</p>
  <div class="header-status" id="status">Cargando...</div>
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
  <button class="btn-refresh" onclick="cargarTodo()">🔄 Actualizar</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div>Cargando pedido desde el inventario...</div>
<div class="banner" id="banner"></div>
<div class="resumen" id="resumen">
  <h2>📊 Resumen por proveedor</h2>
  <div class="resumen-grid" id="resumen-grid"></div>
  <div class="total-general" id="total-general"></div>
</div>
<div class="proveedores-container" id="cont"></div>
<div class="footer">Lista de Pedido · Lidia Gourmet · Solo productos con pedido &gt; 0</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJIjXq5c2V1143ysphCD61iYL2DNnEjoesb3IQI5KZvMzLqrpXzBZY-PlYfHOBhfO1/exec";
const LS_CACHE = "cache_pedido_v2";
const LS_CHECK = "comprado_v2";

const DEMO = { actualizado:"(demo)", categorias:[
  { nombre:"🧀 Cremería", items:[
    {nombre:"Q. Amarillo",unidad:"unidad",pedir:5,precio:0},
    {nombre:"Q. Oaxaca",unidad:"kg",pedir:4,precio:0},
    {nombre:"Tocino",unidad:"kg",pedir:3,precio:0,obs:"Marca buena, la otra no sirve"} ]},
  { nombre:"🥤 Coca", items:[
    {nombre:"Coca 600",unidad:"paquete",pedir:7,precio:0} ]},
  { nombre:"🥦 Verduras", items:[] },
]};

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

let CHECKS = {};
function cargarChecks(stamp){
  try{ const o=JSON.parse(localStorage.getItem(LS_CHECK)||"{}");
    if(o.stamp!==stamp){ CHECKS={}; } else { CHECKS=o.items||{}; }
  }catch(e){ CHECKS={}; }
  CHECKS.__stamp = stamp;
}
function guardarChecks(){
  try{ localStorage.setItem(LS_CHECK, JSON.stringify({stamp:CHECKS.__stamp, items:CHECKS})); }catch(e){}
}
function keyOf(cat,nombre){ return cat+"||"+nombre; }

function actualizarProgreso(){
  const all=document.querySelectorAll("tr[data-k]");
  let n=0; all.forEach(tr=>{ if(tr.classList.contains("done")) n++; });
  document.getElementById("pbar").style.width = all.length? (n/all.length*100)+"%":"0";
}

function toggle(tr){
  tr.classList.toggle("done");
  const done=tr.classList.contains("done");
  tr.querySelector(".check").innerHTML = done? "✓":"";
  CHECKS[tr.dataset.k]=done; guardarChecks(); actualizarProgreso();
}

function render(data, desdeCache){
  cargarChecks(data.actualizado||"");
  const cont=document.getElementById("cont"); cont.innerHTML="";
  const grid=document.getElementById("resumen-grid"); grid.innerHTML="";
  let totalArt=0, totalCosto=0, hayPrecio=false;

  data.categorias.forEach(cat=>{
    const items=(cat.items||[]).filter(i=>Number(i.pedir)>0);
    totalArt+=items.length;
    const costo=items.reduce((s,i)=>s+Number(i.pedir)*Number(i.precio||0),0);
    if(costo>0) hayPrecio=true; totalCosto+=costo;
    const it=document.createElement("div"); it.className="resumen-item";
    it.innerHTML=`${cat.nombre} <span class="badge ${items.length===0?"cero":""}">${items.length}</span>`;
    grid.appendChild(it);

    const div=document.createElement("div"); div.className="proveedor"+(items.length===0?" sin-pedido":"");
    div.innerHTML=`<div class="proveedor-header">${cat.nombre} <span class="count">${items.length} art.</span></div>`;
    if(items.length===0){
      const p=document.createElement("div"); p.style.cssText="background:#fff;padding:12px;font-size:13px;color:#aaa;text-align:center;";
      p.textContent="✅ Sin pedido esta semana"; div.appendChild(p); cont.appendChild(div); return;
    }
    const table=document.createElement("table");
    table.innerHTML=`<thead><tr><th class="check-col"></th><th>Producto</th><th>Cantidad</th></tr></thead>`;
    const tb=document.createElement("tbody");
    items.forEach(p=>{
      const k=keyOf(cat.nombre,p.nombre); const done=!!CHECKS[k];
      const tr=document.createElement("tr"); tr.dataset.k=k; if(done) tr.classList.add("done");
      tr.onclick=function(){ toggle(this); };
      const precio = Number(p.precio||0)>0? `<div class="precio">$${(Number(p.pedir)*Number(p.precio)).toFixed(0)}</div>`:"";
      const obs = p.obs? `<div class="obsnote">📝 ${esc(p.obs)}</div>`:"";
      tr.innerHTML=`<td class="check-col"><div class="check">${done?"✓":""}</div></td>
        <td>${esc(p.nombre)}${obs}</td>
        <td class="qty">${p.pedir} <span class="unit">${p.unidad||""}</span>${precio}</td>`;
      tb.appendChild(tr);
    });
    table.appendChild(tb); div.appendChild(table); cont.appendChild(div);
  });

  let tg=`TOTAL: ${totalArt} artículos a pedir`;
  if(hayPrecio) tg+=`  ·  ~$${totalCosto.toFixed(0)}`;
  document.getElementById("total-general").textContent=tg;
  document.getElementById("resumen").style.display="block";
  document.getElementById("cont").style.display="block";
  document.getElementById("loading").style.display="none";

  const b=document.getElementById("banner");
  if(desdeCache){ b.className="banner warn"; b.textContent="📴 Sin conexión: mostrando la última lista guardada"+(data.actualizado?(" ("+data.actualizado+")"):"")+"."; }
  else { b.style.display="none"; }
  const upd = data.actualizado? ("Inventario: "+data.actualizado) : "";
  const ahora=new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("status").textContent = (desdeCache? "Guardado · ":"Cargado "+ahora+" · ")+upd;
  actualizarProgreso();
}

async function cargarTodo(){
  document.getElementById("loading").style.display="block";
  document.getElementById("resumen").style.display="none";
  document.getElementById("cont").style.display="none";
  document.getElementById("status").textContent="Actualizando...";
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    try{ localStorage.setItem(LS_CACHE, JSON.stringify(data)); }catch(e){}
    render(data,false);
  }catch(e){
    let cache=null; try{ cache=JSON.parse(localStorage.getItem(LS_CACHE)||"null"); }catch(_){}
    if(cache){ render(cache,true); }
    else { render(DEMO,true); document.getElementById("banner").textContent="⚠️ Sin conexión y sin datos guardados: mostrando ejemplo."; }
  }
}
cargarTodo();
</script>
</body>
</html>
